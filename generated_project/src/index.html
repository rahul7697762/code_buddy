<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleTodo</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>SimpleTodo</h1>
    </header>
    <section class="task-input">
        <input id="new-task-input" type="text" placeholder="What needs to be done?" autocomplete="off">
        <button id="add-task-btn">Add</button>
    </section>
    <main class="task-list">
        <ul id="tasks-ul"></ul>
    </main>
    <footer class="task-filters">
        <button id="filter-all">All</button>
        <button id="filter-active">Active</button>
        <button id="filter-completed">Completed</button>
    </footer>
    <div id="edit-modal" class="modal hidden"></div>
</body>
</html>
